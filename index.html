<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #F4EFE3; }
  body { font-family: 'Cairo', sans-serif; -webkit-font-smoothing: antialiased; color: #473C28; }
  button { font-family: 'Cairo', sans-serif; }
  input, select, textarea { font-family: 'Cairo', sans-serif; }
  ::selection { background: #E9D9B6; }
  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D8CCB0; border-radius: 999px; border: 2px solid #F4EFE3; }
  ::-webkit-scrollbar-thumb:hover { background: #C2B391; }

  @keyframes tcFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes tcMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .tc-row-hover:hover { filter: brightness(0.98); }

  /* responsive */
  .tc-mobile-nav { display: none; }
  @media (max-width: 860px) {
    .tc-desktop-nav { display: none !important; }
    .tc-mobile-btn { display: block !important; }
    .tc-hero-grid { grid-template-columns: 1fr !important; }
    .tc-feat-grid { grid-template-columns: 1fr !important; }
    .tc-form-grid { grid-template-columns: 1fr !important; }
    .tc-split { flex-direction: column !important; }
    .tc-split-aside { width: 100% !important; }
  }
  @media (max-width: 560px) {
    .tc-stats-grid { grid-template-columns: 1fr 1fr !important; }
  }
</style>
